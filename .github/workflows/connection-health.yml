name: API Connection Health Check

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    paths:
      - 'pipeline/src/ingestion.py'
      - 'pipeline/src/health_check.py'

permissions:
  contents: read
  issues: write

jobs:
  check-satellite-apis:
    name: Satellite API Health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@692973e3d93d1264569f2d19d11d9a151250d182 # v4.1.7

      - name: Set up Python 3.12
        uses: actions/setup-python@82c7e631bb3eae9cfba2d2d03984cdc55c82996b # v5.1.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pipeline/requirements.txt'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Check GEE connectivity
        continue-on-error: true
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: python pipeline/src/health_check.py --provider gee --output health_gee.json

      - name: Check CDSE connectivity
        continue-on-error: true
        env:
          CDSE_CLIENT_ID: ${{ secrets.CDSE_CLIENT_ID }}
          CDSE_CLIENT_SECRET: ${{ secrets.CDSE_CLIENT_SECRET }}
        run: python pipeline/src/health_check.py --provider cdse --output health_cdse.json

      - name: Check NASA EarthData
        continue-on-error: true
        env:
          NASA_EARTHDATA_TOKEN: ${{ secrets.NASA_EARTHDATA_TOKEN }}
        run: python pipeline/src/health_check.py --provider nasa --output health_nasa.json

      - name: Check World Bank API
        continue-on-error: true
        run: python pipeline/src/health_check.py --provider worldbank --output health_worldbank.json

      - name: Check IMF API
        continue-on-error: true
        run: python pipeline/src/health_check.py --provider imf --output health_imf.json

      - name: Merge health reports
        if: always()
        run: |
          python -c "
          import json
          from pathlib import Path

          files = [
              Path('health_gee.json'),
              Path('health_cdse.json'),
              Path('health_nasa.json'),
              Path('health_worldbank.json'),
              Path('health_imf.json'),
          ]
          merged = {
              'checked_at': None,
              'results': [],
          }
          for file_path in files:
              data = json.loads(file_path.read_text(encoding='utf-8'))
              merged['checked_at'] = data['checked_at']
              merged['results'].extend(data['results'])
          Path('health_report.json').write_text(json.dumps(merged, indent=2) + '\n', encoding='utf-8')
          print('Merged health report written to health_report.json')
          "

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: api-health-report-${{ github.run_id }}
          path: health_report.json

      - name: Evaluate health report
        if: always()
        run: |
          python -c "
          import json
          from pathlib import Path

          data = json.loads(Path('health_report.json').read_text(encoding='utf-8'))
          results = data['results']
          if any(result['status'] == 'auth_failed' for result in results):
              raise SystemExit(2)
          if any(result['status'] not in {'ok', 'skipped'} for result in results):
              raise SystemExit(1)
          print('API health check passed')
          "

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] API Health Check Failed — ${new Date().toISOString()}`,
              body: `The weekly API connectivity check failed. Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['api-health', 'automated']
            })
