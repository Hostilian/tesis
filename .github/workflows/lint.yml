name: Lint & Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pipeline/requirements-dev.txt'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements-dev.txt

      - name: Run Black Formatter Check
        run: black --check pipeline/src/ pipeline/run_pipeline.py

      - name: Run Flake8 Linter
        run: flake8 pipeline/src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Mypy
        run: mypy pipeline/src/ --strict
